short_bio_text_justify: false
short_bio: >-
  <p>
    I am a Ph.D. student in Computer Science at the
    University of Illinois Urbana-Champaign, advised by
    <a href="https://yilinglou.github.io/" target="_blank" rel="noopener">Yiling Lou</a>.
    My current research focuses on the intersection of <strong>AI and software engineering (AI4SE/SE4AI)</strong>, with an emphasis on
    <strong>agent observability</strong>, <strong>debugging</strong>, and <strong>reliability in large language model-based systems</strong>.
  </p>

  <p>
    Previously, I was a Research Affiliate at the
    MIT Media Lab, working with
    <a href="https://pliang279.github.io/" target="_blank" rel="noopener">Paul Liang</a>, and a Research Assistant at
    Johns Hopkins University, collaborating with
    <a href="https://www.haofrankyang.net/" target="_blank" rel="noopener">Hao Frank Yang</a> and
    <a href="https://hongru94.github.io/" target="_blank" rel="noopener">Hongru Du</a>.
    My earlier research explored <strong>multimodal large language models</strong>, <strong>human-centered AI</strong>, and
    <strong>intelligent systems</strong>, aiming to model and understand human reactions, decisions, and behaviors in complex environments.
  </p>

  <p>
    Before academia, I worked as a Software Engineer at
    Microsoft, where I built large-scale distributed systems in
    Azure Workflow, gaining strong experience in <strong>production-grade infrastructure</strong>,
    <strong>system optimization</strong>, and <strong>scalable AI system deployment</strong>.
  </p>

  <p>
    I received my B.S. in Computer Science from
    Tongji University, where I worked on medical imaging and robotics with
    <a href="https://ieeexplore.ieee.org/author/37407069800" target="_blank" rel="noopener">Yufei Chen</a> and
    <a href="https://ieeexplore.ieee.org/author/37085342733" target="_blank" rel="noopener">Peng Qi</a>.
  </p>

